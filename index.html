<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Clowder &amp; Crest</title>
  <meta name="description" content="A cozy medieval cat guild management game. Recruit cats, take jobs, solve puzzles, and build your guild from rags to riches.">
  <meta property="og:title" content="Clowder & Crest">
  <meta property="og:description" content="A cozy medieval cat guild management game with puzzles, pixel art, and bond conversations.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://clowder.stephens.page">
  <meta property="og:image" content="https://clowder.stephens.page/assets/sprites/scenes/town_day.png">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="stylesheet" href="/src/ui/overlay.css" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-81TZVKST2W"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-81TZVKST2W');
  </script>
</head>
<body>
  <div id="game-wrapper">
    <!-- Phaser canvas renders here -->
    <div id="game-container"></div>

    <!-- HTML/CSS overlay layer -->
    <div id="overlay-layer">
      <!-- Status bar - top -->
      <div id="status-bar">
        <span id="status-fish">0 Fish</span>
        <span id="status-day">Day 1</span>
        <span id="status-time">Dawn</span>
        <span id="status-chapter">Ch. 1</span>
        <button id="status-pause" style="background:none;border:1px solid #3a3530;color:#8b7355;font-size:12px;padding:2px 6px;border-radius:3px;cursor:pointer;font-family:Georgia,serif">||</button>
      </div>

      <!-- Bottom navigation -->
      <nav id="bottom-bar">
        <button class="nav-btn active" data-scene="guildhall">
          <span class="nav-icon">&#127970;</span>
          <span class="nav-label">Guild</span>
        </button>
        <button class="nav-btn" data-scene="town">
          <span class="nav-icon">&#127963;</span>
          <span class="nav-label">Town</span>
        </button>
        <button class="nav-btn" data-scene="cats">
          <span class="nav-icon">&#128049;</span>
          <span class="nav-label">Cats</span>
        </button>
        <button class="nav-btn" data-scene="menu">
          <span class="nav-icon">&#9776;</span>
          <span class="nav-label">Menu</span>
        </button>
      </nav>

      <!-- Overlay panels (hidden by default) -->
      <div id="panel-overlay" class="panel hidden"></div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
